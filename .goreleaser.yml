# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: secrets-sync

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: secrets-sync
    main: ./cmd/secrets-sync
    binary: secrets-sync
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/jbcom/secrets-sync/cmd/secrets-sync/cmd.Version={{.Version}}
      - -X github.com/jbcom/secrets-sync/cmd/secrets-sync/cmd.Commit={{.Commit}}
      - -X github.com/jbcom/secrets-sync/cmd/secrets-sync/cmd.Date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE*
      - README*
      - CHANGELOG*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "🚀 Features"
      regexp: '^.*?feat(\([[:word:]]+\))?!?:.+$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))?!?:.+$'
      order: 1
    - title: "⚡ Performance"
      regexp: '^.*?perf(\([[:word:]]+\))?!?:.+$'
      order: 2
    - title: "♻️ Refactoring"
      regexp: '^.*?refactor(\([[:word:]]+\))?!?:.+$'
      order: 3
    - title: "📦 Dependencies"
      regexp: '^.*?(deps|build)(\([[:word:]]+\))?!?:.+$'
      order: 4
    - title: "🔒 Security"
      regexp: '^.*?security(\([[:word:]]+\))?!?:.+$'
      order: 5
    - title: Others
      order: 999

release:
  github:
    owner: jbcom
    name: secrets-sync
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## SecretSync {{ .Tag }}

    ### Installation

    **Binary:**
    Download from the assets below for your platform.

    **Go install:**
    ```bash
    go install github.com/jbcom/secrets-sync/cmd/secrets-sync@{{ .Tag }}
    ```

  footer: |
    ---
    **Full Changelog**: https://github.com/jbcom/secrets-sync/compare/{{ .PreviousTag }}...{{ .Tag }}

# Container and chart artifacts are outside this binary release workflow.
# Keep release notes limited to artifacts built here.
dockers: []
