# Minimal Vault-to-AWS Secrets Manager pipeline.

vault:
  address: https://vault.example.com/
  namespace: platform/secrets
  auth:
    token:
      token: ${VAULT_TOKEN}

aws:
  region: us-west-2

sources:
  app-secrets:
    vault:
      mount: secret
      paths:
        - hello/world

merge_store:
  vault:
    mount: merged-secrets

targets:
  example-account:
    account_id: "111111111111"
    region: us-west-2
    secret_prefix: /example/
    imports:
      - app-secrets

pipeline:
  dry_run: false
  continue_on_error: false
