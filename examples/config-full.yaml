# Full SecretSync pipeline configuration example.

log:
  level: info
  format: json

vault:
  address: https://vault.example.com/
  namespace: platform/secrets
  auth:
    approle:
      mount: approle
      role_id: ${VAULT_ROLE_ID}
      secret_id: ${VAULT_SECRET_ID}

aws:
  region: us-east-1
  execution_context:
    type: delegated_admin
    account_id: "123456789012"
    delegation:
      services:
        - organizations.amazonaws.com
        - sso.amazonaws.com
  control_tower:
    enabled: true
    execution_role:
      name: AWSControlTowerExecution
  organizations:
    auto_discover: true
  identity_center:
    enabled: true
    auto_discover: true

sources:
  shared:
    vault:
      mount: shared
      paths:
        - app/*
        - platform/*
  analytics:
    vault:
      mount: analytics
      paths:
        - services/*
  production-overrides:
    vault:
      mount: production

merge_store:
  s3:
    bucket: secrets-sync-merge-store
    prefix: merged/
    kms_key_id: alias/secrets-sync-merge-store
    versioning:
      enabled: true
      retain_versions: 20

targets:
  staging:
    account_id: "111111111111"
    region: us-east-1
    secret_prefix: /staging/
    imports:
      - shared
      - analytics
  production:
    account_id: "222222222222"
    region: us-east-1
    secret_prefix: /production/
    imports:
      - staging
      - production-overrides

dynamic_targets:
  analytics_sandboxes:
    discovery:
      organizations:
        ous:
          - ou-xxxx-sandbox
        recursive: true
        tag_filters:
          - key: Team
            values:
              - analytics
            operator: equals
        exclude_statuses:
          - SUSPENDED
    imports:
      - shared
      - analytics
    secret_prefix: /sandbox/
    region: us-east-1

pipeline:
  merge:
    parallel: 4
  sync:
    parallel: 4
    delete_orphans: false
  dry_run: false
  continue_on_error: true
