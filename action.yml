---
name: "SecretSync"
author: "jbcom"
description: "Sync secrets from HashiCorp Vault to AWS Secrets Manager across multiple accounts"
inputs:
  config:
    description: "Path to SecretSync configuration file"
    required: false
    default: "config.yaml"
  targets:
    description: "Comma-separated list of targets to process"
    required: false
    default: ""
  dry-run:
    description: "Run without making changes"
    required: false
    default: "false"
  merge-only:
    description: "Only run the merge phase"
    required: false
    default: "false"
  sync-only:
    description: "Only run the sync phase"
    required: false
    default: "false"
  discover:
    description: "Enable dynamic target discovery from AWS Organizations/Identity Center"
    required: false
    default: "false"
  output-format:
    description: "Output format: human, json, github, compact, side-by-side"
    required: false
    default: "github"
  compute-diff:
    description: "Compute and show diff even when not in dry-run mode"
    required: false
    default: "false"
  exit-code:
    description: "Use exit codes: 0=no changes, 1=changes, 2=errors"
    required: false
    default: "false"
  continue-on-error:
    description: "Continue processing remaining targets after an error"
    required: false
    default: "true"
  parallelism:
    description: "Maximum concurrent target operations; 0 uses config/default"
    required: false
    default: "0"
  metrics-addr:
    description: "Metrics server bind address"
    required: false
    default: "0.0.0.0"
  metrics-port:
    description: "Metrics server port; 0 disables metrics"
    required: false
    default: "0"
  log-level:
    description: "Logging level: debug, info, warn, error"
    required: false
    default: "info"
  log-format:
    description: "Log format: text or json"
    required: false
    default: "text"
outputs:
  changes:
    description: "Total changed secrets when diff output is computed"
  added:
    description: "Secrets that would be added or were added"
  removed:
    description: "Secrets that would be removed or were removed"
  modified:
    description: "Secrets that would be modified or were modified"
  unchanged:
    description: "Secrets with no detected changes"
  zero_sum:
    description: "true when the computed diff has no changes"
runs:
  using: "docker"
  # Prefer a digest-pinned image once the release workflow can refresh the
  # action reference automatically:
  # 1. docker pull jbcom/secretssync:v1
  # 2. docker inspect --format='{{index .RepoDigests 0}}' jbcom/secretssync:v1
  # 3. image: "docker://jbcom/secretssync:v1@sha256:<digest>"
  # Until then, keep the release-please-managed tag reference below.
  image: "docker://jbcom/secretssync:v1" # x-release-please-version
  args:
    - "pipeline"
    - "--config"
    - "${{ inputs.config }}"
    - "--targets"
    - "${{ inputs.targets }}"
    - "--dry-run=${{ inputs.dry-run }}"
    - "--merge-only=${{ inputs.merge-only }}"
    - "--sync-only=${{ inputs.sync-only }}"
    - "--discover=${{ inputs.discover }}"
    - "--output"
    - "${{ inputs.output-format }}"
    - "--diff=${{ inputs.compute-diff }}"
    - "--exit-code=${{ inputs.exit-code }}"
    - "--continue-on-error=${{ inputs.continue-on-error }}"
    - "--parallelism"
    - "${{ inputs.parallelism }}"
    - "--metrics-addr"
    - "${{ inputs.metrics-addr }}"
    - "--metrics-port"
    - "${{ inputs.metrics-port }}"
    - "--log-level"
    - "${{ inputs.log-level }}"
    - "--log-format"
    - "${{ inputs.log-format }}"
branding:
  icon: "lock"
  color: "blue"

# Action inputs are passed to the Docker action as explicit CLI flags.
# The CLI also supports SECRETSYNC_* environment variables for direct container
# use; see https://github.com/jbcom/secrets-sync#configuration for full docs.
#
# Required:
#   SECRETSYNC_CONFIG       - Path to config file (default: config.yaml)
#
# Optional:
#   SECRETSYNC_TARGETS      - Comma-separated list of targets (default: all)
#   SECRETSYNC_DRY_RUN      - Run without making changes (default: false)
#   SECRETSYNC_MERGE_ONLY   - Only run merge phase (default: false)
#   SECRETSYNC_SYNC_ONLY    - Only run sync phase (default: false)
#   SECRETSYNC_DISCOVER     - Enable dynamic target discovery (default: false)
#   SECRETSYNC_OUTPUT       - Output format: human, json, github, compact, side-by-side (default: github)
#   SECRETSYNC_DIFF         - Show diff even without dry-run (default: false)
#   SECRETSYNC_EXIT_CODE    - Use exit codes for CI (default: false)
#   SECRETSYNC_LOG_LEVEL    - Log level: debug, info, warn, error (default: info)
#   SECRETSYNC_LOG_FORMAT   - Log format: text, json (default: text)
#
# Vault Authentication (one required):
#   VAULT_ADDR              - Vault server address
#   VAULT_TOKEN             - Vault token (or use AppRole/K8s auth in config)
#   VAULT_ROLE_ID           - AppRole role ID
#   VAULT_SECRET_ID         - AppRole secret ID
#
# AWS Authentication:
#   Use aws-actions/configure-aws-credentials pinned to a reviewed commit before this action for OIDC
