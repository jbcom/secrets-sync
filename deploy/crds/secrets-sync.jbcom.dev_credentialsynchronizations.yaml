apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: credentialsynchronizations.secrets-sync.jbcom.dev
spec:
  group: secrets-sync.jbcom.dev
  names:
    kind: CredentialSynchronization
    listKind: CredentialSynchronizationList
    plural: credentialsynchronizations
    singular: credentialsynchronization
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - schedule
                - configRef
              properties:
                schedule:
                  type: string
                  description: Cron schedule for running secrets-sync.
                timezone:
                  type: string
                  description: IANA timezone for schedule evaluation (e.g. Europe/Berlin). Defaults to the cluster timezone.
                staggerMinutes:
                  type: integer
                  minimum: 0
                  default: 0
                  description: Deterministically offset the schedule minute within this window to stagger many targets and avoid provider rate limits. 0 disables staggering.
                suspend:
                  type: boolean
                  default: false
                image:
                  type: string
                  default: ghcr.io/jbcom/secrets-sync:v2.3.1
                configRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    key:
                      type: string
                      default: config.yaml
                targets:
                  type: string
                  description: Optional comma-separated target allowlist.
                operation:
                  type: string
                  enum:
                    - pipeline
                    - merge
                    - sync
                  default: pipeline
                dryRun:
                  type: boolean
                  default: false
                discover:
                  type: boolean
                  default: false
                computeDiff:
                  type: boolean
                  default: true
                outputFormat:
                  type: string
                  enum:
                    - human
                    - json
                    - github
                    - compact
                    - side-by-side
                  default: json
                continueOnError:
                  type: boolean
                  default: true
                parallelism:
                  type: integer
                  minimum: 0
                  default: 0
                serviceAccountName:
                  type: string
                envFrom:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                env:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                lastRunTime:
                  type: string
                  format: date-time
                lastSuccessTime:
                  type: string
                  format: date-time
                phase:
                  type: string
                  enum:
                    - Pending
                    - Running
                    - Succeeded
                    - Failed
                    - Suspended
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Schedule
          type: string
          jsonPath: .spec.schedule
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Last Success
          type: date
          jsonPath: .status.lastSuccessTime
