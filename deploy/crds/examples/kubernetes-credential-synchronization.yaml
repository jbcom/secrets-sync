apiVersion: secrets-sync.jbcom.dev/v1alpha1
kind: CredentialSynchronization
metadata:
  name: platform-secrets
  namespace: secrets-sync
spec:
  schedule: "*/30 * * * *"
  image: ghcr.io/jbcom/secrets-sync:v2.2.0
  configRef:
    name: platform-secrets-sync-config
    key: config.yaml
  operation: pipeline
  dryRun: false
  discover: true
  computeDiff: true
  outputFormat: json
  continueOnError: true
  parallelism: 4
  serviceAccountName: secrets-sync
  envFrom:
    - secretRef:
        name: secrets-sync-provider-credentials
