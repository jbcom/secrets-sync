{{- if and .Values.pipeline.enabled .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "secretsync.serviceAccountName" . }}
  labels:
    {{- include "secretsync.labels" . | nindent 4 }}
    {{- include "secretsync.selectorLabels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
