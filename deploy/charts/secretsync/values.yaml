nameOverride: ""
fullnameOverride: ""

image:
  repository: docker.io/jbcom/secretssync
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

env: []
envFrom: []
extraVolumeMounts: []
extraVolumes: []

nodeSelector: {}
tolerations: []
affinity: {}

logLevel: info
logFormat: json

metrics:
  enabled: false
  addr: "0.0.0.0"
  port: 9090

pipeline:
  enabled: false
  schedule: ""
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  backoffLimit: 1
  restartPolicy: Never
  existingConfigMap: ""
  config: {}
  targets: ""
  mergeOnly: false
  syncOnly: false
  dryRun: false
  discover: false
  continueOnError: true
  parallelism: 0
  output: json
  diff: true
  exitCode: false
