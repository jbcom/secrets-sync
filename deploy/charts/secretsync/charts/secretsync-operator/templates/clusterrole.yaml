{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "secretsync-operator.fullname" . }}
  labels:
    {{- include "secretsync-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["events", "secrets", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["secretsync.extendeddata.dev"]
    resources: ["secretsyncs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["secretsync.extendeddata.dev"]
    resources: ["secretsyncs/status"]
    verbs: ["get", "update", "patch"]
{{- end -}}
