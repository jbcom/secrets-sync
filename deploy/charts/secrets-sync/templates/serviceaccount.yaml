{{- if and .Values.pipeline.enabled .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "secrets-sync.serviceAccountName" . }}
  labels:
    {{- include "secrets-sync.labels" . | nindent 4 }}
    {{- include "secrets-sync.selectorLabels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
