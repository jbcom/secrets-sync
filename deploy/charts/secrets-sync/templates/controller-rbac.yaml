{{- if and .Values.controller.enabled .Values.controller.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-controller" (include "secrets-sync.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "secrets-sync.labels" . | nindent 4 }}
    {{- include "secrets-sync.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: controller
rules:
  - apiGroups:
      - secrets-sync.jbcom.dev
    resources:
      - credentialsynchronizations
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - secrets-sync.jbcom.dev
    resources:
      - credentialsynchronizations/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - batch
    resources:
      - cronjobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-controller" (include "secrets-sync.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "secrets-sync.labels" . | nindent 4 }}
    {{- include "secrets-sync.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ printf "%s-controller" (include "secrets-sync.fullname" .) | trunc 63 | trimSuffix "-" }}
subjects:
  - kind: ServiceAccount
    name: {{ include "secrets-sync.controllerServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
