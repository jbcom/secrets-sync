{{- if .Values.pipeline.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "secrets-sync.fullname" . }}
  labels:
    {{- include "secrets-sync.labels" . | nindent 4 }}
    {{- include "secrets-sync.selectorLabels" . | nindent 4 }}
spec:
  schedule: {{ required "pipeline.schedule is required when pipeline.enabled=true" .Values.pipeline.schedule | quote }}
  concurrencyPolicy: {{ .Values.pipeline.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.pipeline.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.pipeline.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.pipeline.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "secrets-sync.selectorLabels" . | nindent 12 }}
            {{- with .Values.podLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          serviceAccountName: {{ include "secrets-sync.serviceAccountName" . }}
          restartPolicy: {{ .Values.pipeline.restartPolicy }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: secrets-sync
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              args:
                - pipeline
                - --config
                - /config/config.yaml
                - --continue-on-error={{ .Values.pipeline.continueOnError }}
                - --diff={{ .Values.pipeline.diff }}
                - --dry-run={{ .Values.pipeline.dryRun }}
                - --exit-code={{ .Values.pipeline.exitCode }}
                - --output
                - {{ .Values.pipeline.output | quote }}
                - --parallelism
                - {{ .Values.pipeline.parallelism | quote }}
                {{- if .Values.pipeline.targets }}
                - --targets
                - {{ .Values.pipeline.targets | quote }}
                {{- end }}
                {{- if .Values.pipeline.mergeOnly }}
                - --merge-only
                {{- end }}
                {{- if .Values.pipeline.syncOnly }}
                - --sync-only
                {{- end }}
                {{- if .Values.pipeline.discover }}
                - --discover
                {{- end }}
                {{- if .Values.logLevel }}
                - --log-level
                - {{ .Values.logLevel | quote }}
                {{- end }}
                {{- if .Values.logFormat }}
                - --log-format
                - {{ .Values.logFormat | quote }}
                {{- end }}
                {{- if .Values.metrics.enabled }}
                - --metrics-addr
                - {{ .Values.metrics.addr | quote }}
                - --metrics-port
                - {{ .Values.metrics.port | quote }}
                {{- end }}
              {{- with .Values.env }}
              env:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              {{- with .Values.envFrom }}
              envFrom:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
                {{- with .Values.extraVolumeMounts }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
          volumes:
            - name: config
              configMap:
                name: {{ include "secrets-sync.configMapName" . }}
            {{- with .Values.extraVolumes }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
