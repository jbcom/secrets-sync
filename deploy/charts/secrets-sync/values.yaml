nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/jbcom/secrets-sync
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

env: []
envFrom: []
extraVolumeMounts: []
extraVolumes: []

nodeSelector: {}
tolerations: []
affinity: {}

logLevel: info
logFormat: json

metrics:
  enabled: false
  addr: "0.0.0.0"
  port: 9090

controller:
  enabled: false
  resync: 1m
  watchNamespace: ""
  image:
    repository: ""
    pullPolicy: ""
    tag: ""
  rbac:
    create: true
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  podAnnotations: {}
  podLabels: {}
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

pipeline:
  enabled: false
  schedule: ""
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  backoffLimit: 1
  restartPolicy: Never
  existingConfigMap: ""
  config: {}
  targets: ""
  mergeOnly: false
  syncOnly: false
  dryRun: false
  discover: false
  continueOnError: true
  parallelism: 0
  output: json
  diff: true
  exitCode: false
