apiVersion: apps/v1
kind: Deployment
metadata:
  name: secrets-sync-controller
  namespace: secrets-sync
  labels:
    app.kubernetes.io/name: secrets-sync
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: secrets-sync
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secrets-sync
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: secrets-sync-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: controller
          image: ghcr.io/jbcom/secrets-sync:v2.2.0
          imagePullPolicy: IfNotPresent
          command:
            - secrets-sync-controller
          args:
            - --log-format=json
            - --resync=1m
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
