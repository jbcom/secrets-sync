apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-sync-controller
  namespace: secrets-sync
  labels:
    app.kubernetes.io/name: secrets-sync
    app.kubernetes.io/component: controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secrets-sync-controller
  labels:
    app.kubernetes.io/name: secrets-sync
    app.kubernetes.io/component: controller
rules:
  - apiGroups:
      - secrets-sync.jbcom.dev
    resources:
      - credentialsynchronizations
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - secrets-sync.jbcom.dev
    resources:
      - credentialsynchronizations/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - batch
    resources:
      - cronjobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secrets-sync-controller
  labels:
    app.kubernetes.io/name: secrets-sync
    app.kubernetes.io/component: controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secrets-sync-controller
subjects:
  - kind: ServiceAccount
    name: secrets-sync-controller
    namespace: secrets-sync
