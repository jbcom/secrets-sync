[tox]
requires =
    tox>=4.11
    tox-uv>=1.11
    tox-gh>=1.3
env_list =
    py311
    py312
    py313
    py314
    lint
    typecheck
    docs
    build
min_version = 4.11
skip_missing_interpreters = true

[gh]
python =
    3.11 = py311
    3.12 = py312
    3.13 = py313
    3.14 = py314

[testenv]
description = Run Python bridge tests
skip_install = true
deps =
    {env:EXTENDED_DATA_SOURCE:extended-data>=8.0.0,<9.0.0}
    {toxinidir}/packages/secrets-sync-bridge[tests]
commands =
    pytest {posargs:{toxinidir}/packages/secrets-sync-bridge/tests --cov=secrets_sync --cov-report=term-missing}

[testenv:lint]
description = Lint Python bridge
skip_install = true
deps = ruff>=0.8.0
commands =
    ruff check {toxinidir}/packages/secrets-sync-bridge/src {toxinidir}/packages/secrets-sync-bridge/tests {toxinidir}/docs/conf.py
    ruff format --check {toxinidir}/packages/secrets-sync-bridge/src {toxinidir}/packages/secrets-sync-bridge/tests {toxinidir}/docs/conf.py

[testenv:typecheck]
description = Type-check Python bridge
skip_install = true
deps =
    {env:EXTENDED_DATA_SOURCE:extended-data>=8.0.0,<9.0.0}
    {toxinidir}/packages/secrets-sync-bridge[typing]
commands =
    mypy {toxinidir}/packages/secrets-sync-bridge/src/secrets_sync

[testenv:docs]
description = Build Sphinx docs
skip_install = true
deps =
    {env:EXTENDED_DATA_SOURCE:extended-data>=8.0.0,<9.0.0}
    {toxinidir}/packages/secrets-sync-bridge[docs]
commands =
    sphinx-build -W -b html {toxinidir}/docs {toxinidir}/docs/_build/html

[testenv:build]
description = Build Python wheel and sdist
skip_install = true
deps = build>=1.3.0
commands =
    python -m build {toxinidir}/packages/secrets-sync-bridge
