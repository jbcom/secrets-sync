[tox]
requires =
    tox>=4.11
    tox-uv>=1.11
env_list =
    lint
    pytools
    docs
min_version = 4.11

[testenv:lint]
description = Lint Python-based documentation tooling
skip_install = true
deps = ruff>=0.8.0
commands =
    ruff check {toxinidir}/docs/conf.py {toxinidir}/tools {toxinidir}/tests/python
    ruff format --check {toxinidir}/docs/conf.py {toxinidir}/tools {toxinidir}/tests/python

[testenv:pytools]
description = Test Python helper tooling
skip_install = true
deps = pytest>=8.0.0
commands =
    pytest {toxinidir}/tests/python

[testenv:docs]
description = Generate Go API markdown and build Sphinx docs
skip_install = true
allowlist_externals = bash
deps =
    furo>=2025.12.19
    myst-parser>=4.0.1,<6.0.0
    sphinx>=8.2.3,<9.0.0
    sphinx-copybutton>=0.5.2
commands =
    bash {toxinidir}/scripts/generate-api-docs.sh
    bash {toxinidir}/scripts/validate-docs.sh
    sphinx-build -W -b html {toxinidir}/docs {toxinidir}/docs/_build/html
