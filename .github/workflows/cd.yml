name: CD

on:
  workflow_dispatch:
    inputs:
      go_tag:
        description: Root SecretSync release tag
        required: false
        type: string

permissions: {}

jobs:
  verify-release:
    name: Verify release gates
    if: inputs.go_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.go_tag }}
          persist-credentials: false
      - run: sudo apt-get update && sudo apt-get install -y just
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.4"
          cache-dependency-path: go.sum
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.19"
          enable-cache: true
          cache-suffix: release-gates
          cache-dependency-glob: |
            Justfile
            tox.ini
            docs/conf.py
            scripts/*.sh
            tools/*.py
            tests/python/**/*.py
            python/secrets_sync/**/*.go
      - run: uv tool install tox --with tox-uv
      - run: just vuln
      - run: just test-go
      - run: GO_TOOLCHAIN=go1.25.11 just test-go
      - run: just build-all
      - run: just python-matrix
      - run: just quality
      - run: just docker-build ghcr.io/jbcom/secrets-sync:release-check

  goreleaser:
    name: GoReleaser
    needs: [verify-release]
    if: inputs.go_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.go_tag }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.4"
          cache-dependency-path: go.sum
      - run: GOTOOLCHAIN=go1.26.4 go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: v2.16.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-image:
    name: Publish GHCR image
    needs: [goreleaser]
    if: ${{ inputs.go_tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.go_tag }}
          persist-credentials: false
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push GHCR image
        env:
          GO_TAG: ${{ inputs.go_tag }}
        run: |
          set -euo pipefail
          tag="${GO_TAG}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Refusing to publish image for unexpected tag: $tag" >&2
            exit 1
          fi
          version="$tag"
          major="${version%%.*}"
          image="ghcr.io/jbcom/secrets-sync"
          docker build --build-arg VERSION="$tag" -t "$image:$version" -t "$image:$major" -t "$image:latest" .
          docker push "$image:$version"
          docker push "$image:$major"
          docker push "$image:latest"

  publish-docs:
    name: Publish docs to GitHub Pages
    needs: [goreleaser, publish-image]
    if: ${{ always() && inputs.go_tag != '' && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.go_tag }}
          persist-credentials: false
      - run: sudo apt-get update && sudo apt-get install -y just
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.4"
          cache-dependency-path: go.sum
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.19"
          enable-cache: true
          cache-suffix: docs
          cache-dependency-glob: |
            Justfile
            tox.ini
            docs/conf.py
            scripts/generate-api-docs.sh
            scripts/validate-docs.sh
      - run: uv tool install tox --with tox-uv --with tox-gh
      - run: just docs
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/_build/html
      - id: deployment
        name: Deploy docs
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  build-python-binding:
    name: Build Python binding ${{ matrix.python-version }}
    needs: [goreleaser]
    if: ${{ inputs.go_tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.go_tag }}
          persist-credentials: false
      - run: sudo apt-get update && sudo apt-get install -y just
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.4"
          cache-dependency-path: go.sum
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.19"
          enable-cache: true
          cache-suffix: python-${{ matrix.python-version }}-release
          cache-dependency-glob: |
            Justfile
            scripts/check-python-binding.sh
            scripts/install-gopy.sh
            scripts/python-binding-version.sh
            tools/check_python_dist.py
            tools/patch_python_dist.py
            python/secrets_sync/**/*.go
      - name: Build Python binding
        env:
          VERSION: ${{ inputs.go_tag }}
        run: just python-build ${{ matrix.python-version }}
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: python-binding-${{ matrix.python-version }}
          path: python/build/secrets_sync/dist/*
          if-no-files-found: error

  publish-python-binding:
    name: Publish Python binding
    needs: [build-python-binding]
    if: ${{ inputs.go_tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-binding-*
          path: python-dist
          merge-multiple: true
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.19"
          enable-cache: false
      - name: Publish secrets-sync-python-binding
        run: |
          set -euo pipefail
          find python-dist -maxdepth 1 -type f -print | sort
          uv publish --trusted-publishing always --check-url https://pypi.org/simple/secrets-sync-python-binding/ python-dist/*
